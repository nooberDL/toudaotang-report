<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>头道汤 · 培训报告</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:linear-gradient(180deg,#fdf6ee 0%,#f8f4ef 100%);color:#1e293b;min-height:100vh;padding-bottom:32px}
.header{background:linear-gradient(135deg,#8B6914 0%,#C4973B 50%,#A67C28 100%);color:#fff;padding:28px 20px 36px;text-align:center;position:relative;overflow:hidden;max-width:560px;margin:16px auto 0;border-radius:16px}
.header::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08)}
.header::after{content:'';position:absolute;bottom:-20px;left:-20px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.05)}
.header .brand{font-size:13px;opacity:.8;letter-spacing:3px;margin-bottom:4px}
.header h1{font-size:22px;font-weight:700;margin:8px 0}
.header .meta{font-size:13px;opacity:.7;display:flex;align-items:center;justify-content:center;gap:6px}
.container{max-width:560px;margin:0 auto;padding:0 16px}
.card{background:#fff;border-radius:16px;padding:24px 20px;margin-top:16px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.card:first-child{margin-top:16px;box-shadow:0 4px 24px rgba(139,105,20,.08)}
.card h2{font-size:16px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:#1e293b}
.card h2 .icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}

/* Score Circle */
.score-circle{text-align:center;padding:8px 0}
.score-circle svg{transform:rotate(-90deg)}
.score-circle .value{font-size:36px;font-weight:800}
.score-circle .label{font-size:14px;color:#64748b;margin-top:4px}
.score-diff{display:inline-flex;align-items:center;gap:2px;font-size:13px;font-weight:600;margin-left:8px;padding:2px 8px;border-radius:12px}
.score-diff.up{color:#10b981;background:#10b98118}
.score-diff.down{color:#ef4444;background:#ef444418}
.score-diff.same{color:#94a3b8;background:#94a3b818}

/* Radar */
.radar-wrap{display:flex;justify-content:center;margin:8px 0 16px}
.radar-wrap svg text{font-size:11px;fill:#64748b}
.dim-grid{display:flex;flex-wrap:wrap;gap:8px}
.dim-item{flex:1 1 45%;display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#fafaf8;border-radius:10px;font-size:13px}
.dim-item .name{color:#64748b}
.dim-item .val{font-weight:700}
.dim-item .val.high{color:#10b981}
.dim-item .val.mid{color:#f59e0b}
.dim-item .val.low{color:#ef4444}

/* Question List */
.q-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#fafaf8;border-radius:10px;margin-bottom:8px;border-left:3px solid #e2e8f0}
.q-item.s10{border-left-color:#10b981}
.q-item.s07{border-left-color:#f59e0b}
.q-item.s03{border-left-color:#f97316}
.q-item.s00{border-left-color:#ef4444}
.q-num{width:24px;height:24px;border-radius:50%;background:#8B6914;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-right:10px;flex-shrink:0}
.q-label{font-size:14px;color:#334155;flex:1}
.q-badge{padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap}
.q-badge.s10{background:#10b98120;color:#10b981;border:1px solid #10b98140}
.q-badge.s07{background:#f59e0b20;color:#f59e0b;border:1px solid #f59e0b40}
.q-badge.s03{background:#f9731820;color:#f97316;border:1px solid #f9731640}
.q-badge.s00{background:#ef444420;color:#ef4444;border:1px solid #ef444440}

/* Strengths & Weaknesses */
.sw-grid{display:flex;gap:12px}
.sw-box{flex:1;border-radius:16px;padding:16px}
.sw-box.good{background:#f0fdf4}
.sw-box.bad{background:#fef2f2}
.sw-box h3{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:4px}
.sw-box.good h3{color:#166534}
.sw-box.bad h3{color:#991b1b}
.sw-box li{font-size:13px;line-height:1.6;list-style:none;padding:2px 0}
.sw-box.good li{color:#15803d}
.sw-box.bad li{color:#dc2626}

/* Suggestions */
.sug-item{padding:12px 14px;background:#fffbf0;border-radius:12px;margin-bottom:10px;border-left:3px solid #C4973B}
.sug-item .sug-title{font-size:13px;font-weight:700;color:#8B6914;margin-bottom:4px}
.sug-item .sug-text{font-size:13px;color:#44403c;line-height:1.6}

/* Trend Chart */
.trend-chart{position:relative;height:180px;margin:8px 0}
.trend-chart canvas{width:100%!important;height:100%!important}

/* History */
.hist-item{margin-bottom:8px}
.hist-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:12px;cursor:pointer;transition:background .2s}
.hist-header:hover{background:#f8f4ef}
.hist-header.current{background:#fffbf0;border:1px solid rgba(196,151,59,.25)}
.hist-header .round-info .title{font-size:14px;font-weight:600}
.hist-header .round-info .date{font-size:12px;color:#94a3b8;margin-top:2px}
.hist-header .round-score{display:flex;align-items:center;gap:6px}
.hist-header .round-score .num{font-size:20px;font-weight:800}
.hist-header .round-score .num.high{color:#10b981}
.hist-header .round-score .num.mid{color:#f59e0b}
.hist-header .round-score .num.low{color:#ef4444}
.hist-header .arrow{font-size:12px;color:#94a3b8;transition:transform .2s}
.hist-header.open .arrow{transform:rotate(180deg)}
.hist-detail{display:none;padding:12px 14px;background:#fafaf8;border-radius:0 0 12px 12px;margin-top:-4px}
.hist-detail.open{display:block}
.hist-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.hist-tag{font-size:12px;padding:3px 8px;background:#fff;border-radius:6px;color:#64748b}
.hist-tag b{color:#1e293b}
.hist-note{font-size:12px;margin-bottom:2px}
.hist-note.good{color:#15803d}
.hist-note.bad{color:#dc2626}
.cur-badge{font-size:11px;color:#8B6914;background:rgba(196,151,59,.13);padding:1px 6px;border-radius:4px;margin-left:6px}

.footer{text-align:center;padding:24px 0 8px;color:#94a3b8;font-size:12px}

/* Error */
.error-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;padding:40px 20px;text-align:center}
.error-page .emoji{font-size:64px;margin-bottom:16px}
.error-page h2{font-size:20px;color:#1e293b;margin-bottom:8px}
.error-page p{font-size:14px;color:#64748b;line-height:1.6}

@media(max-width:400px){
.sw-grid{flex-direction:column}
.dim-item{flex:1 1 100%}
}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ========== 数据解码 ==========
async function decodeData() {
  const params = new URLSearchParams(window.location.search);
  
  // 方案1: ?d= gzip+base64
  const dParam = params.get('d');
  if (dParam) {
    try {
      const binary = atob(dParam.replace(/-/g,'+').replace(/_/g,'/'));
      const bytes = new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
      if (typeof DecompressionStream !== 'undefined') {
        const ds = new DecompressionStream('gzip');
        const writer = ds.writable.getWriter();
        writer.write(bytes);
        writer.close();
        const reader = ds.readable.getReader();
        const chunks = [];
        while(true) {
          const {done, value} = await reader.read();
          if(done) break;
          chunks.push(value);
        }
        const totalLen = chunks.reduce((a,c)=>a+c.length,0);
        const result = new Uint8Array(totalLen);
        let offset = 0;
        for(const c of chunks){result.set(c,offset);offset+=c.length;}
        const jsonStr = new TextDecoder().decode(result);
        return JSON.parse(jsonStr);
      }
    } catch(e) { console.warn('gzip decode failed:', e); }
  }
  
  // 方案2: ?r= raw base64 JSON
  const rParam = params.get('r');
  if (rParam) {
    try {
      const jsonStr = decodeURIComponent(atob(rParam.replace(/-/g,'+').replace(/_/g,'/')));
      return JSON.parse(jsonStr);
    } catch(e) { console.warn('raw decode failed:', e); }
  }

  // 方案3: ?j= URL编码的JSON
  const jParam = params.get('j');
  if (jParam) {
    try {
      return JSON.parse(decodeURIComponent(jParam));
    } catch(e) { console.warn('json decode failed:', e); }
  }

  return null;
}

// ========== 精简key → 完整key 映射 ==========
const BD_MAP = {a:'企业文化',b:'品牌与项目',c:'接待流程',d:'检测话术',e:'职业素养'};
const SG_MAP = {x:'话术表达',y:'专业度',z:'情绪价值'};

function expandRound(r) {
  if (!r) return null;
  const result = {
    round: r.rd !== undefined ? r.rd : r.round,
    date: r.dt !== undefined ? r.dt : r.date,
    totalScore: r.ts !== undefined ? r.ts : r.totalScore,
    questionScores: r.qs !== undefined ? r.qs : r.questionScores,
    strengths: r.st !== undefined ? r.st : r.strengths || [],
    weaknesses: r.wk !== undefined ? r.wk : r.weaknesses || []
  };
  // breakdown
  const rawBd = r.bd !== undefined ? r.bd : r.breakdown;
  if (rawBd) {
    result.breakdown = {};
    for (const [k, v] of Object.entries(rawBd)) {
      result.breakdown[BD_MAP[k] || k] = v;
    }
  }
  // suggestions
  const rawSg = r.sg !== undefined ? r.sg : r.suggestions;
  if (rawSg) {
    result.suggestions = {};
    for (const [k, v] of Object.entries(rawSg)) {
      result.suggestions[SG_MAP[k] || k] = v;
    }
  }
  return result;
}

function expandData(raw) {
  if (!raw) return null;
  
  // 如果已经是完整key格式（有userName或currentRound），直接返回
  if (raw.userName !== undefined || raw.currentRound !== undefined) {
    return raw;
  }
  
  // 精简key格式，需要展开
  const expanded = {
    userName: raw.n !== undefined ? raw.n : '',
    currentRound: expandRound(raw.r),
    history: []
  };
  
  // 展开历史轮次
  const rawHistory = raw.h || [];
  expanded.history = rawHistory.map(h => expandRound(h));
  
  // 把当前轮也加入history（如果history中没有同轮次的记录）
  if (expanded.currentRound) {
    const curRound = expanded.currentRound.round;
    const hasInHistory = expanded.history.some(h => h && h.round === curRound);
    if (!hasInHistory) {
      expanded.history.push({
        round: expanded.currentRound.round,
        date: expanded.currentRound.date,
        totalScore: expanded.currentRound.totalScore,
        breakdown: expanded.currentRound.breakdown,
        strengths: expanded.currentRound.strengths,
        weaknesses: expanded.currentRound.weaknesses
      });
    }
    // 按轮次排序
    expanded.history.sort((a, b) => (a.round || 0) - (b.round || 0));
  }
  
  return expanded;
}

// ========== 渲染逻辑 ==========
const DIM_LABELS = {
  D1:'使命',D2:'愿景',D3:'价值观',D4:'品牌介绍',D5:'三道汤',
  D6:'接待流程',D7:'检测维度',D8:'检测话术',D9:'引火归元',
  D10:'蜂养减痛',D11:'护理后注意',D12:'创始人',D13:'回访/销售'
};

const SCORE_MAP = {
  '1':   {label:'完美',cls:'s10'},
  '0.7': {label:'良好',cls:'s07'},
  '0.3': {label:'部分正确',cls:'s03'},
  '0':   {label:'未掌握',cls:'s00'}
};

function getScoreInfo(s) {
  const key = String(s);
  return SCORE_MAP[key] || SCORE_MAP['0'];
}

function getScoreColor(score, full) {
  const pct = score / full;
  if (pct >= 0.8) return '#10b981';
  if (pct >= 0.6) return '#f59e0b';
  if (pct >= 0.4) return '#f97316';
  return '#ef4444';
}

function getScoreClass(score, full) {
  const pct = score / full;
  if (pct >= 0.7) return 'high';
  if (pct >= 0.5) return 'mid';
  return 'low';
}

// SVG 雷达图
function renderRadar(breakdown, breakdownFull) {
  const dims = Object.keys(breakdown);
  const n = dims.length;
  if (n === 0) return '';
  const cx = 140, cy = 130, R = 90;
  const angleStep = (2 * Math.PI) / n;
  
  function polar(i, r) {
    const a = angleStep * i - Math.PI / 2;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  }
  
  let gridLines = '';
  [0.25, 0.5, 0.75, 1].forEach(pct => {
    const r = R * pct;
    let pts = [];
    for(let i=0;i<n;i++) pts.push(polar(i, r).join(','));
    gridLines += '<polygon points="'+pts.join(' ')+'" fill="none" stroke="#e2e8f0" stroke-width="1"/>';
  });
  
  let axisLines = '';
  for(let i=0;i<n;i++){
    const [x,y] = polar(i, R);
    axisLines += '<line x1="'+cx+'" y1="'+cy+'" x2="'+x+'" y2="'+y+'" stroke="#e2e8f0" stroke-width="1"/>';
  }
  
  let labels = '';
  for(let i=0;i<n;i++){
    const [x,y] = polar(i, R + 22);
    const anchor = x < cx - 10 ? 'end' : x > cx + 10 ? 'start' : 'middle';
    labels += '<text x="'+x+'" y="'+y+'" text-anchor="'+anchor+'" dominant-baseline="middle" font-size="12" fill="#64748b">'+dims[i]+'</text>';
  }
  
  let scorePts = [];
  for(let i=0;i<n;i++){
    const maxVal = breakdownFull[dims[i]] || 3;
    const val = breakdown[dims[i]] || 0;
    const r = R * (val / maxVal);
    scorePts.push(polar(i, r).join(','));
  }
  
  let fullPts = [];
  for(let i=0;i<n;i++) fullPts.push(polar(i, R).join(','));
  
  const dotsSvg = scorePts.map(function(p) {
    var xy = p.split(',');
    return '<circle cx="'+xy[0]+'" cy="'+xy[1]+'" r="4" fill="#8B6914"/>';
  }).join('');
  
  return '<svg viewBox="0 0 280 260" width="280" height="260" xmlns="http://www.w3.org/2000/svg">'
    +gridLines+axisLines
    +'<polygon points="'+fullPts.join(' ')+'" fill="none" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 4"/>'
    +'<polygon points="'+scorePts.join(' ')+'" fill="rgba(196,151,59,0.2)" stroke="#8B6914" stroke-width="2"/>'
    +dotsSvg+labels+'</svg>';
}

// 趋势折线图
function renderTrend(history) {
  if (!history || history.length < 2) return '';
  
  var W = 500, H = 180, padL = 40, padR = 20, padT = 20, padB = 36;
  var chartW = W - padL - padR;
  var chartH = H - padT - padB;
  var n = history.length;
  var stepX = chartW / (n - 1);
  
  var gridLines = '';
  for(var v = 0; v <= 10; v += 2) {
    var y = padT + chartH - (v / 10) * chartH;
    gridLines += '<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="#f1f5f9" stroke-width="1"/>';
    gridLines += '<text x="'+(padL-8)+'" y="'+(y+4)+'" text-anchor="end" font-size="11" fill="#94a3b8">'+v+'</text>';
  }
  
  var points = [];
  var labelsStr = '';
  history.forEach(function(h, i) {
    var x = padL + i * stepX;
    var score = h.totalScore || 0;
    var yPos = padT + chartH - (score / 10) * chartH;
    points.push(x+','+yPos);
    labelsStr += '<text x="'+x+'" y="'+(H-8)+'" text-anchor="middle" font-size="11" fill="#64748b">'+(h.round ? '\u7B2C'+h.round+'\u8F6E' : '')+'</text>';
  });
  
  var polyline = '<polyline points="'+points.join(' ')+'" fill="none" stroke="#8B6914" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  var dots = points.map(function(p,i) {
    var xy = p.split(',');
    var score = history[i].totalScore || 0;
    return '<circle cx="'+xy[0]+'" cy="'+xy[1]+'" r="5" fill="#8B6914" stroke="#fff" stroke-width="2"/>'
          +'<text x="'+xy[0]+'" y="'+(parseFloat(xy[1])-12)+'" text-anchor="middle" font-size="11" font-weight="700" fill="#8B6914">'+score+'</text>';
  }).join('');
  
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" xmlns="http://www.w3.org/2000/svg" style="max-width:'+W+'px">'
    +gridLines+polyline+dots+labelsStr+'</svg>';
}

function renderReport(data) {
  var cur = data.currentRound;
  if (!cur) { renderError(); return; }
  var history = data.history || [];
  var name = data.userName || '\u5B66\u5458';
  
  var breakdownFull = {'\u4F01\u4E1A\u6587\u5316':2,'\u54C1\u724C\u4E0E\u9879\u76EE':3,'\u63A5\u5F85\u6D41\u7A0B':2,'\u68C0\u6D4B\u8BDD\u672F':2,'\u804C\u4E1A\u7D20\u517B':1};
  
  // Score diff
  var prevRound = history.length >= 2 ? history[history.length - 2] : null;
  var scoreDiff = prevRound ? (cur.totalScore - prevRound.totalScore).toFixed(1) : null;
  var diffHtml = '';
  if (scoreDiff !== null) {
    var cls = scoreDiff > 0 ? 'up' : scoreDiff < 0 ? 'down' : 'same';
    var arrow = scoreDiff > 0 ? '\u2191' : scoreDiff < 0 ? '\u2193' : '\u2192';
    diffHtml = '<span class="score-diff '+cls+'">'+arrow+' '+(scoreDiff > 0 ? '+' : '')+scoreDiff+'</span>';
  }
  
  // Score circle
  var scoreColor = getScoreColor(cur.totalScore, 10);
  var pct = Math.round((cur.totalScore / 10) * 100);
  var r = 54;
  var circ = 2 * Math.PI * r;
  var offset = circ * (1 - pct / 100);
  
  // Questions
  var questions = '';
  if (cur.questionScores) {
    var qEntries = Object.entries(cur.questionScores);
    qEntries.forEach(function(entry, i) {
      var k = entry[0], v = entry[1];
      var info = getScoreInfo(v);
      questions += '<div class="q-item '+info.cls+'">'
        +'<span class="q-num">'+(i+1)+'</span>'
        +'<span class="q-label">'+k+' '+(DIM_LABELS[k]||k)+'</span>'
        +'<span class="q-badge '+info.cls+'">'+v+'\u5206 \u00B7 '+info.label+'</span>'
        +'</div>';
    });
  }
  
  // Breakdown dims
  var dimItems = '';
  if (cur.breakdown) {
    Object.entries(cur.breakdown).forEach(function(entry) {
      var k = entry[0], v = entry[1];
      var full = breakdownFull[k] || 3;
      var cls2 = getScoreClass(v, full);
      dimItems += '<div class="dim-item"><span class="name">'+k+'</span><span class="val '+cls2+'">'+v+' / '+full+'</span></div>';
    });
  }
  
  // Radar
  var radarSvg = renderRadar(cur.breakdown || {}, breakdownFull);
  
  // Strengths & Weaknesses
  var strengthsHtml = (cur.strengths||[]).map(function(s){return '<li>\u2705 '+s+'</li>';}).join('');
  var weaknessesHtml = (cur.weaknesses||[]).map(function(w){return '<li>\u26A0\uFE0F '+w+'</li>';}).join('');
  
  // Suggestions
  var sugHtml = '';
  if (cur.suggestions) {
    Object.entries(cur.suggestions).forEach(function(entry) {
      sugHtml += '<div class="sug-item"><div class="sug-title">'+entry[0]+'</div><div class="sug-text">'+entry[1]+'</div></div>';
    });
  }
  
  // Trend
  var trendSvg = renderTrend(history);
  
  // History
  var histHtml = '';
  var reversedHistory = history.slice().reverse();
  reversedHistory.forEach(function(h) {
    if (!h) return;
    var isCur = cur.round && h.round === cur.round;
    var cls3 = getScoreClass(h.totalScore || 0, 10);
    var tags = '';
    if (h.breakdown) {
      Object.entries(h.breakdown).forEach(function(entry) {
        tags += '<span class="hist-tag">'+entry[0]+' <b>'+entry[1]+'</b></span>';
      });
    }
    var sHtml = (h.strengths||[]).map(function(s){return '<div class="hist-note good">\u2705 '+s+'</div>';}).join('');
    var wHtml = (h.weaknesses||[]).map(function(w){return '<div class="hist-note bad">\u26A0\uFE0F '+w+'</div>';}).join('');
    
    histHtml += '<div class="hist-item">'
      +'<div class="hist-header '+(isCur?'current':'')+'" onclick="toggleHist(this)">'
        +'<div class="round-info">'
          +'<div class="title">\u7B2C'+(h.round||'?')+'\u8F6E'+(isCur?'<span class=cur-badge>\u672C\u8F6E</span>':'')+'</div>'
          +'<div class="date">'+(h.date||'')+'</div>'
        +'</div>'
        +'<div class="round-score">'
          +'<span class="num '+cls3+'">'+(h.totalScore||0)+'</span>'
          +'<span style="font-size:12px;color:#94a3b8">/ 10</span>'
          +'<span class="arrow">\u25BC</span>'
        +'</div>'
      +'</div>'
      +'<div class="hist-detail">'
        +'<div class="hist-tags">'+tags+'</div>'
        +sHtml+wHtml
      +'</div>'
    +'</div>';
  });
  
  document.getElementById('app').innerHTML = ''
