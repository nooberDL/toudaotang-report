<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>头道汤 · 培训报告</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --gold-1:#04857f;
  --gold-2:#06a8a2;
  --gold-3:#07c0ba;
  --gold-soft:#e8fafa;
  --gold-tint:#f0fbfb;
  --gold-line:#bfeae8;
  --bg:#eef9f9;
  --ink:#0d3433;
  --ink-2:#2c5251;
  --mute:#94a3b8;
  --good:#0d8a5e;
  --warn:#d97706;
  --orange:#ea580c;
  --bad:#cc4040;
  --ease-out:cubic-bezier(.22,.8,.22,1);
  --ease-in-out:cubic-bezier(.65,0,.35,1);
}

*{margin:0;padding:0;box-sizing:border-box}
body{overflow-x:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--bg);
  background-image:
    radial-gradient(at 12% 8%, rgba(7,192,186,.08) 0, transparent 45%),
    radial-gradient(at 88% 92%, rgba(5,150,144,.06) 0, transparent 45%);
  color:var(--ink);
  min-height:100vh;
  padding-bottom:32px;
  -webkit-font-smoothing:antialiased;
}
.serif{font-family:"Noto Serif SC",-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",serif}

/* ========== Header ========== */
.header-wrap{
  max-width:560px;
  margin:16px auto 0;
  padding:0 16px;
}
.header{
  position:relative;
  background:linear-gradient(135deg, rgba(4,133,127,.85) 0%, rgba(7,192,186,.78) 50%, rgba(4,133,127,.85) 100%);
  color:#fff;
  padding:34px 22px 40px;
  text-align:center;
  overflow:hidden;
  border-radius:18px;
  box-shadow:0 10px 32px rgba(4,133,127,.22), inset 0 1px 0 rgba(255,255,255,.25);
  backdrop-filter:blur(14px) saturate(1.3);
  -webkit-backdrop-filter:blur(14px) saturate(1.3);
  border:1px solid rgba(255,255,255,.28);
  opacity:0;
  transform:translateY(-8px);
  animation:headerIn .7s var(--ease-out) .05s forwards;
}
@keyframes headerIn{to{opacity:1;transform:none}}
.header-deco-top{position:absolute;top:0;left:0;right:0;height:34px;opacity:.28;pointer-events:none}
.header-deco-bottom{position:absolute;bottom:0;left:0;right:0;height:46px;opacity:.18;pointer-events:none}

.header-logo{
  width:50px;height:50px;
  margin:0 auto 12px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.14);
  border:1.5px solid rgba(255,255,255,.32);
  border-radius:50%;
  position:relative;z-index:2;
}
.steam{
  position:absolute;
  top:18px;left:50%;
  width:30px;height:24px;
  pointer-events:none;
  transform:translateX(-50%);
  z-index:3;
}
.steam path{
  stroke:rgba(255,255,255,.55);
  stroke-width:1.4;
  fill:none;
  stroke-linecap:round;
  transform-origin:bottom center;
}
.steam path:nth-child(1){animation:steam 3.2s ease-in-out infinite}
.steam path:nth-child(2){animation:steam 3.2s ease-in-out .8s infinite}
.steam path:nth-child(3){animation:steam 3.2s ease-in-out 1.6s infinite}
@keyframes steam{
  0%   {opacity:0;transform:translateY(4px) scaleY(.4)}
  30%  {opacity:.7}
  100% {opacity:0;transform:translateY(-14px) scaleY(1)}
}

.header .brand{font-size:12px;letter-spacing:5px;margin-bottom:4px;opacity:.85;position:relative;z-index:2}
.header h1{font-size:22px;font-weight:700;margin:8px 0 12px;position:relative;z-index:2;letter-spacing:1px}
.header .meta{
  font-size:13px;opacity:.92;
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(0,0,0,.14);
  padding:5px 14px;border-radius:20px;
  position:relative;z-index:2;
}

/* ========== Layout & Card ========== */
.container{max-width:560px;margin:0 auto;padding:0 16px}
.card{
  background:#fff;
  border-radius:16px;
  padding:22px 20px;
  margin-top:14px;
  box-shadow:0 2px 14px rgba(89,60,10,.05);
  position:relative;
  opacity:0;
  transform:translateY(14px);
  animation:cardIn .55s var(--ease-out) forwards;
}
.container > .card:nth-child(1){animation-delay:.15s}
.container > .card:nth-child(2){animation-delay:.22s}
.container > .card:nth-child(3){animation-delay:.29s}
.container > .card:nth-child(4){animation-delay:.36s}
.container > .card:nth-child(5){animation-delay:.43s}
.container > .card:nth-child(6){animation-delay:.50s}
.container > .card:nth-child(7){animation-delay:.57s}
.container > .card:nth-child(8){animation-delay:.64s}
@keyframes cardIn{to{opacity:1;transform:none}}

.card-title{
  font-size:15px;font-weight:700;
  margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
  color:var(--ink);
}
.card-title .ico-box{
  width:30px;height:30px;
  border-radius:9px;
  background:linear-gradient(135deg,var(--gold-soft),#bfeae8);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}

/* ========== Score Circle ========== */
.score-wrap{text-align:center;padding:8px 0 4px;position:relative}
.score-svg-wrap{position:relative;width:148px;height:148px;margin:0 auto}
.score-svg-wrap svg{width:148px;height:148px;transform:rotate(-90deg)}
.score-center{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.score-center .value{
  font-size:42px;font-weight:900;line-height:1;
  font-family:"Noto Serif SC",serif;
  font-variant-numeric:tabular-nums;
}
.score-center .total{font-size:13px;color:var(--mute);margin-top:4px;letter-spacing:1px}
.score-label{
  font-size:14px;color:#64748b;
  margin-top:12px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  flex-wrap:wrap;
}
.score-tier{
  display:inline-block;
  font-size:12px;font-weight:600;
  padding:3px 12px;border-radius:20px;
  letter-spacing:1px;
  background:var(--gold-soft);
  color:var(--gold-1);
  border:1px solid rgba(7,192,186,.3);
}
.score-diff{
  display:inline-flex;align-items:center;gap:3px;
  font-size:12px;font-weight:600;
  padding:3px 10px;border-radius:12px;
  opacity:0;transform:scale(.85);
  animation:diffIn .4s var(--ease-out) 1.2s forwards;
}
@keyframes diffIn{to{opacity:1;transform:none}}
.score-diff.up{color:var(--good);background:rgba(13,138,94,.1)}
.score-diff.down{color:var(--bad);background:rgba(204,64,64,.1)}
.score-diff.same{color:var(--mute);background:rgba(148,163,184,.12)}

/* ========== Radar ========== */
.radar-wrap{display:flex;justify-content:center;margin:4px 0 14px}
.radar-poly{
  transform-origin:140px 130px;
  transform:scale(0);
  animation:radarIn 1s var(--ease-out) .6s forwards;
}
@keyframes radarIn{to{transform:scale(1)}}
.radar-dot{opacity:0;animation-fill-mode:forwards}
@keyframes radarDot{to{opacity:1}}
.dim-grid{display:flex;flex-wrap:wrap;gap:8px}
.dim-item{
  flex:1 1 calc(50% - 4px);
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 12px;
  background:rgba(240,251,251,.45);
  border:1px solid rgba(191,234,232,.5);
  border-radius:10px;
  font-size:13px;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  cursor:pointer;
  transition:transform .2s var(--ease-out),border-color .2s,background .2s;
}
.dim-item:active{transform:scale(.97)}
.dim-item.is-active{border-color:var(--gold-3);background:#daf3f1}
.dim-item .name{color:var(--ink-2)}
.dim-item .val{font-weight:700;font-variant-numeric:tabular-nums;font-family:"Noto Serif SC",serif}
.dim-item .val.high{color:var(--good)}
.dim-item .val.mid{color:var(--warn)}
.dim-item .val.low{color:var(--bad)}

/* ========== Question ========== */
.q-filter{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.q-chip{
  font:inherit;font-size:12.5px;font-weight:500;
  padding:6px 13px;
  background:rgba(240,251,251,.55);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(191,234,232,.6);
  color:var(--ink-2);
  border-radius:20px;
  cursor:pointer;
  transition:all .2s var(--ease-out);
  display:inline-flex;align-items:center;gap:5px;
}
.q-chip .count{
  font-size:11px;
  background:rgba(0,0,0,.06);
  padding:0 6px;border-radius:8px;
  font-variant-numeric:tabular-nums;
}
.q-chip:active{transform:scale(.95)}
.q-chip.active{background:var(--gold-1);color:#fff;border-color:var(--gold-1)}
.q-chip.active .count{background:rgba(255,255,255,.2);color:#fff}

.q-list{position:relative}
.q-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 12px;
  background:rgba(240,251,251,.5);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border-radius:10px;
  margin-bottom:8px;
  border-left:3px solid #e2d9c1;
  cursor:pointer;
  transition:background .2s,opacity .25s,transform .25s,max-height .02s,margin-bottom .02s,padding .02s,border-width .02s;
  flex-wrap:wrap;
  position:relative;
  max-height:60px;
  overflow:hidden;
}
.q-item:active{transform:scale(.99)}
.q-item.s10{border-left-color:var(--good)}
.q-item.s07{border-left-color:var(--warn)}
.q-item.s03{border-left-color:var(--orange)}
.q-item.s00{border-left-color:var(--bad)}
.q-item.is-hidden{
  opacity:0;
  max-height:0;
  margin-bottom:0;
  padding-top:0;padding-bottom:0;
  border-width:0;
  pointer-events:none;
}
.q-item.open{max-height:200px}
.q-num{
  width:24px;height:24px;border-radius:50%;
  background:var(--gold-1);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
  margin-right:10px;flex-shrink:0;
  font-family:"Noto Serif SC",serif;
}
.q-label{font-size:13.5px;color:#3a3528;flex:1;line-height:1.4}
.q-badge{
  padding:3px 10px;border-radius:20px;
  font-size:12px;font-weight:600;
  white-space:nowrap;
}
.q-badge.s10{background:rgba(13,138,94,.1);color:var(--good);border:1px solid rgba(13,138,94,.25)}
.q-badge.s07{background:rgba(201,127,13,.1);color:var(--warn);border:1px solid rgba(201,127,13,.25)}
.q-badge.s03{background:rgba(220,112,25,.1);color:var(--orange);border:1px solid rgba(220,112,25,.25)}
.q-badge.s00{background:rgba(204,64,64,.1);color:var(--bad);border:1px solid rgba(204,64,64,.25)}

.q-detail{
  flex:1 1 100%;
  font-size:12.5px;
  color:var(--ink-2);
  line-height:1.65;
  margin-top:0;
  padding-top:0;
  border-top:1px dashed transparent;
  opacity:0;
  transition:opacity .02s ease,margin-top .02s,padding-top .02s,border-color .02s;
}
.q-item.open .q-detail{
  opacity:1;
  margin-top:10px;
  padding-top:10px;
  border-top-color:var(--gold-line);
}
.q-detail .meta-row{
  display:flex;align-items:center;gap:6px;
  color:var(--gold-1);
  font-weight:600;font-size:12px;
  margin-bottom:4px;
}

.q-empty{
  text-align:center;
  padding:20px 16px;
  color:var(--mute);
  font-size:13px;
  background:var(--gold-tint);
  border-radius:10px;
}

/* ========== S/W ========== */
.sw-grid{display:flex;gap:12px}
.sw-box{flex:1;border-radius:14px;padding:16px 14px;position:relative;overflow:hidden}
.sw-box.good{background:linear-gradient(180deg,#f1faf3 0%,#e8f5ec 100%);border:1px solid #d4ead9}
.sw-box.bad{background:linear-gradient(180deg,#fdf3f1 0%,#f9eae6 100%);border:1px solid #ecd9d3}
.sw-box h3{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sw-box.good h3{color:#0d6b3f}
.sw-box.bad h3{color:#a13624}
.sw-box ul{list-style:none}
.sw-box li{font-size:13px;line-height:1.55;padding:5px 0 5px 18px;position:relative}
.sw-box.good li{color:#1e5e3a}
.sw-box.bad li{color:#a13624}
.sw-box li::before{content:'';position:absolute;left:4px;top:11px;width:6px;height:6px;border-radius:50%}
.sw-box.good li::before{background:var(--good)}
.sw-box.bad li::before{background:var(--bad)}

/* ========== Suggestions ========== */
.sug-item{
  padding:13px 14px;
  background:linear-gradient(180deg,#f0fbfb 0%,#e8fafa 100%);
  border-radius:12px;
  margin-bottom:10px;
  border-left:3px solid var(--gold-3);
}
.sug-item:last-child{margin-bottom:0}
.sug-item .sug-title{font-size:13px;font-weight:700;color:var(--gold-1);margin-bottom:5px}
.sug-item .sug-text{font-size:13px;color:#44403c;line-height:1.65}

/* ========== Trend ========== */
.trend-svg-wrap{overflow-x:auto;position:relative}
.trend-line{
  stroke-dasharray:var(--len);
  stroke-dashoffset:var(--len);
  animation:lineDraw 1.4s var(--ease-out) .9s forwards;
}
@keyframes lineDraw{to{stroke-dashoffset:0}}
.trend-area{opacity:0;animation:areaIn .8s ease 1.6s forwards}
@keyframes areaIn{to{opacity:1}}
.trend-dot{cursor:pointer;opacity:0}
.trend-dot-label{opacity:0}
.trend-tooltip{
  position:absolute;
  background:#2a2620;color:#fff;
  font-size:12px;
  padding:7px 10px;
  border-radius:8px;
  white-space:nowrap;
  pointer-events:none;
  transform:translate(-50%,-115%);
  opacity:0;
  transition:opacity .15s;
  z-index:10;
  box-shadow:0 4px 12px rgba(0,0,0,.18);
}
.trend-tooltip.show{opacity:1}
.trend-tooltip::after{
  content:'';
  position:absolute;
  bottom:-4px;left:50%;
  transform:translateX(-50%) rotate(45deg);
  width:8px;height:8px;
  background:#2a2620;
}
.trend-tooltip .t-round{font-weight:700;margin-bottom:2px}
.trend-tooltip .t-score{color:var(--gold-3);font-family:"Noto Serif SC",serif;font-weight:700}

/* ========== History ========== */
.hist-item{margin-bottom:8px}
.hist-item:last-child{margin-bottom:0}
.hist-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 14px;
  border-radius:12px;
  cursor:pointer;
  transition:background .2s;
  background:rgba(240,251,251,.5);
  border:1px solid rgba(191,234,232,.4);
  user-select:none;
}
.hist-header:active{background:#cae8e6}
.hist-header.current{
  background:linear-gradient(135deg,#f0fbfb,#daf3f1);
  border:1px solid rgba(7,192,186,.32);
}
.hist-header .round-info .title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
.hist-header .round-info .date{font-size:12px;color:var(--mute);margin-top:3px}
.hist-header .round-score{display:flex;align-items:center;gap:6px}
.hist-header .round-score .num{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;font-family:"Noto Serif SC",serif}
.hist-header .round-score .num.high{color:var(--good)}
.hist-header .round-score .num.mid{color:var(--warn)}
.hist-header .round-score .num.low{color:var(--bad)}
.hist-header .arrow-svg{transition:transform .3s var(--ease-out);color:var(--mute);display:flex;align-items:center}
.hist-header.open .arrow-svg{transform:rotate(180deg)}

.hist-detail{
  max-height:0;
  overflow:hidden;
  background:#f0fbfb;
  border:1px solid var(--gold-line);
  border-top:none;
  border-radius:0 0 12px 12px;
  margin-top:-2px;
  transition:max-height .02s,padding .02s;
  padding:0 14px;
}
.hist-detail.open{max-height:400px;padding:12px 14px}
.hist-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.hist-tag{font-size:12px;padding:3px 9px;background:#fff;border:1px solid var(--gold-line);border-radius:6px;color:#64748b}
.hist-tag b{color:var(--ink);font-family:"Noto Serif SC",serif}
.hist-note{font-size:12.5px;margin-bottom:4px;padding-left:14px;position:relative;line-height:1.5}
.hist-note::before{content:'';position:absolute;left:2px;top:8px;width:5px;height:5px;border-radius:50%}
.hist-note.good{color:#1e5e3a}
.hist-note.good::before{background:var(--good)}
.hist-note.bad{color:#a13624}
.hist-note.bad::before{background:var(--bad)}
.cur-badge{font-size:11px;color:var(--gold-1);background:rgba(7,192,186,.18);padding:2px 7px;border-radius:4px;font-weight:600}

/* ========== Footer ========== */
.footer{
  text-align:center;
  padding:28px 0 8px;
  color:var(--mute);
  font-size:12px;
  letter-spacing:.5px;
  opacity:0;
  animation:cardIn .5s var(--ease-out) .8s forwards;
}
.footer-deco{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px;opacity:.5}

/* ========== Empty ========== */
.error-page{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:80vh;padding:40px 20px;text-align:center;
}
.error-page svg{margin-bottom:18px}
.error-page h2{font-size:18px;color:var(--ink);margin-bottom:8px;font-weight:700;font-family:"Noto Serif SC",serif}
.error-page p{font-size:13px;color:#64748b;line-height:1.7}

@media(max-width:400px){
  .sw-grid{flex-direction:column}
  .dim-item{flex:1 1 100%}
}
@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}


/* ========== 背景插图 + 整体氛围 ========== */
body{
  background:#f5fafa;
}
/* 背景图：纯插图，不加白色/青色蒙版 */
body::before{
  content:'';
  position:fixed;
  top:0;
  left:0;

// ========== 数据解码 ==========
async function decodeData() {
  const params = new URLSearchParams(window.location.search);
  const dParam = params.get('d');
  if (dParam) {
    try {
      const binary = atob(dParam.replace(/-/g,'+').replace(/_/g,'/'));
      const bytes = new Uint8Array(binary.length);
      for(let i=0;i<binary.length;i++) bytes[i]=binary.charCodeAt(i);
      if (typeof DecompressionStream !== 'undefined') {
        const ds = new DecompressionStream('gzip');
        const writer = ds.writable.getWriter();
        writer.write(bytes); writer.close();
        const reader = ds.readable.getReader();
        const chunks = [];
        while(true) {
          const {done, value} = await reader.read();
          if(done) break;
          chunks.push(value);
        }
        const totalLen = chunks.reduce((a,c)=>a+c.length,0);
        const result = new Uint8Array(totalLen);
        let offset = 0;
        for(const c of chunks){result.set(c,offset);offset+=c.length;}
        return JSON.parse(new TextDecoder().decode(result));
      }
    } catch(e) { console.warn('gzip decode failed:', e); }
  }
  const rParam = params.get('r');
  if (rParam) {
    try { return JSON.parse(decodeURIComponent(atob(rParam.replace(/-/g,'+').replace(/_/g,'/')))); }
    catch(e) { console.warn('raw decode failed:', e); }
  }
  const jParam = params.get('j');
  if (jParam) {
    try { return JSON.parse(decodeURIComponent(jParam)); }
    catch(e) { console.warn('json decode failed:', e); }
  }
  return null;
}

const DIM_LABELS = {
  D1:'使命',D2:'愿景',D3:'价值观',D4:'品牌介绍',D5:'三道汤',
  D6:'接待流程',D7:'检测维度',D8:'检测话术',D9:'引火归元',
  D10:'蜂养减痛',D11:'护理后注意',D12:'创始人',D13:'回访/销售'
};

const SCORE_MAP = {
  '1':   {label:'完美',     desc:'答题完整准确，涵盖所有得分要点',      cls:'s10'},
  '0.7': {label:'良好',     desc:'掌握主要要点，个别细节有遗漏',         cls:'s07'},
  '0.3': {label:'部分正确', desc:'回答含部分正确内容，但要点缺失较多',   cls:'s03'},
  '0':   {label:'未掌握',   desc:'未答出关键要点，需要重新学习',         cls:'s00'}
};

function getScoreInfo(s) { return SCORE_MAP[String(s)] || SCORE_MAP['0']; }
function getScoreColor(score, full) {
  const pct = score / full;
  if (pct >= 0.8) return '#0d8a5e';
  if (pct >= 0.6) return '#c97f0d';
  if (pct >= 0.4) return '#dc7019';
  return '#cc4040';
}
function getScoreClass(score, full) {
  const pct = score / full;
  if (pct >= 0.7) return 'high';
  if (pct >= 0.5) return 'mid';
  return 'low';
}
function getTier(score) {
  if (score >= 9) return '汤宗 · 卓越';
  if (score >= 8) return '汤师 · 优秀';
  if (score >= 7) return '汤匠 · 良好';
  if (score >= 6) return '汤徒 · 合格';
  if (score >= 4) return '入门 · 待提升';
  return '初学 · 需重训';
}
function svgUse(id, w, h) {
  return `<svg width="${w||14}" height="${h||14}" aria-hidden="true"><use href="#${id}"/></svg>`;
}

// ========== 雷达图 ==========
function renderRadar(breakdown, breakdownFull) {
  const dims = Object.keys(breakdown);
  const n = dims.length;
  const cx = 140, cy = 130, R = 88;
  const angleStep = (2 * Math.PI) / n;
  function polar(i, r) {
    const a = angleStep * i - Math.PI / 2;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  }

  let gridLines = '';
  [0.25, 0.5, 0.75, 1].forEach(pct => {
    const r = R * pct;
    let pts = [];
    for(let i=0;i<n;i++) pts.push(polar(i, r).join(','));
    gridLines += `<polygon points="${pts.join(' ')}" fill="none" stroke="#cdebe9" stroke-width="1"/>`;
  });
  let axisLines = '';
  for(let i=0;i<n;i++){
    const [x,y] = polar(i, R);
    axisLines += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#cdebe9" stroke-width="1"/>`;
  }
  let labels = '';
  for(let i=0;i<n;i++){
    const [x,y] = polar(i, R + 22);
    const anchor = x < cx - 10 ? 'end' : x > cx + 10 ? 'start' : 'middle';
    labels += `<text x="${x}" y="${y}" text-anchor="${anchor}" dominant-baseline="middle" font-size="11.5" fill="#2c5251" font-weight="500">${dims[i]}</text>`;
  }
  let scorePts = [];
  for(let i=0;i<n;i++){
    const maxVal = breakdownFull[dims[i]] || 3;
    const val = breakdown[dims[i]] || 0;
    const r = R * (val / maxVal);
    scorePts.push(polar(i, r).join(','));
  }
  let fullPts = [];
  for(let i=0;i<n;i++) fullPts.push(polar(i, R).join(','));

  return `<svg viewBox="0 0 280 260" width="320" height="260" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="radarGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#07c0ba" stop-opacity=".38"/>
        <stop offset="100%" stop-color="#04857f" stop-opacity=".18"/>
      </radialGradient>
    </defs>
    ${gridLines}${axisLines}
    <polygon points="${fullPts.join(' ')}" fill="none" stroke="#9fdbd8" stroke-width="1" stroke-dasharray="3 4"/>
    <g class="radar-poly">
      <polygon points="${scorePts.join(' ')}" fill="url(#radarGrad)" stroke="#04857f" stroke-width="2" stroke-linejoin="round"/>
      ${scorePts.map((p,i) => {
        const [x,y] = p.split(',');
        return `<circle class="radar-dot" cx="${x}" cy="${y}" r="3.5" fill="#04857f" stroke="#fff" stroke-width="1.5" style="animation:radarDot .35s var(--ease-out) ${0.9 + i*0.08}s forwards"/>`;
      }).join('')}
    </g>
    ${labels}
  </svg>`;
}

// ========== 趋势图 ==========
function renderTrend(history) {
  if (history.length < 2) return {svg:'', points:[]};
  const W = 500, H = 180, padL = 38, padR = 18, padT = 20, padB = 36;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;
  const n = history.length;
  const stepX = chartW / (n - 1);

  let gridLines = '';
  for(let v = 0; v <= 10; v += 2) {
    const y = padT + chartH - (v / 10) * chartH;
    gridLines += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#d8f0ee" stroke-width="1"/>`;
    gridLines += `<text x="${padL-8}" y="${y+4}" text-anchor="end" font-size="10.5" fill="#94a3b8">${v}</text>`;
  }

  const pointsArr = [];
  let labels = '';
  history.forEach((h, i) => {
    const x = padL + i * stepX;
    const y = padT + chartH - (h.totalScore / 10) * chartH;
    pointsArr.push({x, y, round:h.round, score:h.totalScore, date:h.date||''});
    labels += `<text x="${x}" y="${H-8}" text-anchor="middle" font-size="11" fill="#2c5251" font-weight="500">第${h.round}轮</text>`;
  });

  const polylineStr = pointsArr.map(p => `${p.x},${p.y}`).join(' ');
  const areaPts = `${padL},${padT+chartH} ${polylineStr} ${W-padR},${padT+chartH}`;

  let lineLen = 0;
  for(let i=1;i<pointsArr.length;i++){
    const dx = pointsArr[i].x - pointsArr[i-1].x;
    const dy = pointsArr[i].y - pointsArr[i-1].y;
    lineLen += Math.sqrt(dx*dx + dy*dy);
  }

  const dots = pointsArr.map((p,i) =>
    `<circle class="trend-dot" data-idx="${i}" cx="${p.x}" cy="${p.y}" r="6" fill="#04857f" stroke="#fff" stroke-width="2" style="animation:radarDot .3s var(--ease-out) ${1.5 + i*0.15}s forwards"/>
     <text class="trend-dot-label" x="${p.x}" y="${p.y-12}" text-anchor="middle" font-size="11" font-weight="700" fill="#04857f" style="animation:radarDot .3s var(--ease-out) ${1.6 + i*0.15}s forwards">${p.score}</text>`
  ).join('');

  const svg = `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg" style="max-width:${W}px" id="trendSvg">
    <defs>
      <linearGradient id="trendArea" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#07c0ba" stop-opacity=".25"/>
        <stop offset="100%" stop-color="#07c0ba" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${gridLines}
    <polygon class="trend-area" points="${areaPts}" fill="url(#trendArea)"/>
    <polyline class="trend-line" points="${polylineStr}" fill="none" stroke="#04857f" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" style="--len:${Math.ceil(lineLen)}"/>
    ${dots}${labels}
  </svg>`;

  return {svg, points:pointsArr};
}

// ========== 主渲染 ==========

  attachTrendInteractions();
}

// ========== 数字计数 ==========
function animateNumber(el, from, to, duration) {
  const start = performance.now();
  function step(now) {
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    const val = from + (to - from) * eased;
    el.textContent = val.toFixed(1);
    if (t < 1) requestAnimationFrame(step);
    else el.textContent = (+to).toFixed(1);
  }
  requestAnimationFrame(step);
}

// ========== 趋势图交互 ==========
function attachTrendInteractions() {
  const wrap = document.getElementById('trendWrap');
  const tip = document.getElementById('trendTip');
  if (!wrap || !tip) return;
  const dots = wrap.querySelectorAll('.trend-dot');

  function showTip(idx) {
    const p = __trendPoints[idx];
    if (!p) return;
    const svg = wrap.querySelector('svg');
    const svgRect = svg.getBoundingClientRect();
    const wrapRect = wrap.getBoundingClientRect();
    const vb = svg.viewBox.baseVal;
    const scaleX = svgRect.width / vb.width;
    const scaleY = svgRect.height / vb.height;
    const left = (svgRect.left - wrapRect.left) + p.x * scaleX;
    const top  = (svgRect.top  - wrapRect.top)  + p.y * scaleY;
    tip.style.left = left + 'px';
    tip.style.top = top + 'px';
    tip.innerHTML = `<div class="t-round">第 ${p.round} 轮</div><div><span class="t-score">${p.score}</span> 分 · ${p.date}</div>`;
    tip.classList.add('show');
  }
  function hideTip(){ tip.classList.remove('show'); }

  dots.forEach(d => {
    const idx = +d.dataset.idx;
    d.addEventListener('mouseenter', () => showTip(idx));
    d.addEventListener('mouseleave', hideTip);
    d.addEventListener('click', e => { e.stopPropagation(); showTip(idx); setTimeout(hideTip, 2200); });
    d.addEventListener('touchstart', e => { e.preventDefault(); showTip(idx); setTimeout(hideTip, 2200); }, {passive:false});
  });
  document.addEventListener('click', hideTip);
}

// ========== 题目交互 ==========
function toggleQ(el) { el.classList.toggle('open'); }

function filterQ(chip) {
  const filter = chip.dataset.f;
  document.querySelectorAll('.q-chip').forEach(c => c.classList.toggle('active', c === chip));
  const items = document.querySelectorAll('#qList .q-item');
  let visible = 0;
  items.forEach(it => {
    const cls = it.dataset.cls;
    let show = false;
    if (filter === 'all') show = true;
    else if (filter === 'weak') show = (cls === 's03' || cls === 's00');
    else show = (cls === filter);
    it.classList.toggle('is-hidden', !show);
    if (show) visible++;
  });

  const list = document.getElementById('qList');
  let empty = list.querySelector('.q-empty');
  if (visible === 0) {
    if (!empty) {
      empty = document.createElement('div');
      empty.className = 'q-empty';
      empty.textContent = '该分类下暂无题目';
      list.appendChild(empty);
    }
  } else if (empty) empty.remove();
}

// ========== 历史展开 ==========
function toggleHist(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}
